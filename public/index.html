<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060610" />

    <!-- Primary SEO -->
    <title>Mentoria360 — Where Knowledge Begins</title>
    <meta name="description" content="Mentoria360 is a modern coaching institute management platform. Students, tutors, and coaching institutes — all in one place. Manage classes, fees, attendance, tests, and more." />
    <meta name="keywords" content="coaching institute, student management, attendance, fees, online coaching, Mentoria360, tutors, classes" />
    <meta name="author" content="Mentoria360" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn previews) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Mentoria360 — Where Knowledge Begins" />
    <meta property="og:description" content="A modern platform for coaching institutes to manage students, fees, attendance, classes, tests and more." />
    <meta property="og:image"       content="%PUBLIC_URL%/og-image.png" />
    <meta property="og:url"         content="https://mentoria360.web.app" />
    <meta property="og:site_name"   content="Mentoria360" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Mentoria360 — Where Knowledge Begins" />
    <meta name="twitter:description" content="Modern coaching management platform for institutes, tutors, and students." />
    <meta name="twitter:image"       content="%PUBLIC_URL%/og-image.png" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

    <!-- Icons: SVG for modern browsers (crisp at any size), JPG fallback -->
    <link rel="icon"             type="image/svg+xml"  href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon"             type="image/jpeg"     href="%PUBLIC_URL%/favicon.jpg" sizes="32x32" />
    <link rel="apple-touch-icon"                       href="%PUBLIC_URL%/favicon.jpg" sizes="180x180" />
    <meta name="msapplication-TileImage"               content="%PUBLIC_URL%/favicon.jpg" />
    <meta name="msapplication-TileColor"               content="#060614" />

    <!-- Structured Data (JSON-LD) — helps Google understand your app -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mentoria360",
      "description": "Modern coaching institute management platform for managing students, fees, attendance, classes, and tests.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0"
      }
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Mentoria360.</noscript>
    <div id="root"></div>
  </body>
</html>
